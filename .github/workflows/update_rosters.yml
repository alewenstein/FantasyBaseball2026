name: Update Rosters

on:
  schedule:
    - cron: "0 13 * * *"  # Daily at 1pm UTC (9am ET) — before most day games
  workflow_dispatch:       # Also allow manual trigger from the Actions tab

jobs:
  update-rosters:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push the updated rosters.json

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env from secrets
        # yfpy reads OAuth tokens from the .env file in the project directory.
        # YAHOO_REFRESH_TOKEN is the long-lived token — get it by running
        # `python auth.py` locally and copying the value from your .env file.
        run: |
          echo "YAHOO_CLIENT_ID=${{ secrets.YAHOO_CLIENT_ID }}"         >> .env
          echo "YAHOO_CLIENT_SECRET=${{ secrets.YAHOO_CLIENT_SECRET }}" >> .env
          echo "YAHOO_LEAGUE_ID=${{ secrets.YAHOO_LEAGUE_ID }}"         >> .env
          echo "YAHOO_REFRESH_TOKEN=${{ secrets.YAHOO_REFRESH_TOKEN }}" >> .env
          echo "YAHOO_SEASON=${{ secrets.YAHOO_SEASON }}"               >> .env

      - name: Fetch rosters
        run: python fetch_rosters.py

      - name: Commit and push if rosters changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/rosters.json
          git diff --staged --quiet || git commit -m "chore: update rosters [skip ci]"
          git push
