<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fantasy Baseball Game Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a365d 0%, #2c5282 100%);
      color: white;
      padding: 1.5rem 1rem;
      text-align: center;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 0.35rem;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }
    .mode-btn {
      flex: 1;
      padding: 0.55rem 0.75rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #718096;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn:hover { border-color: #90cdf4; color: #2b6cb0; }
    .mode-btn.active {
      border-color: #2b6cb0;
      background: #2b6cb0;
      color: white;
    }

    /* Controls */
    .controls {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: flex-end;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
      min-width: 160px;
    }
    label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #718096;
    }
    select, input[type="date"] {
      padding: 0.55rem 0.75rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      background: white;
      color: #1a202c;
      width: 100%;
      transition: border-color 0.15s;
    }
    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: #4299e1;
    }
    select:disabled {
      background: #f7fafc;
      color: #a0aec0;
    }

    button#find-btn {
      padding: 0.6rem 1.5rem;
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, opacity 0.15s;
      align-self: flex-end;
    }
    button#find-btn:hover { background: #2c5282; }
    button#find-btn:disabled { opacity: 0.6; cursor: default; }

    /* Status line */
    #status {
      font-size: 0.82rem;
      color: #718096;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }

    /* Results */
    #results { margin-top: 1.25rem; }

    .results-header {
      font-size: 0.85rem;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.75rem;
    }

    .no-games {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      color: #718096;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .game-card {
      background: white;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 5px solid #e2e8f0;
      transition: box-shadow 0.15s;
    }
    .game-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
    .game-card.has-many  { border-left-color: #38a169; }
    .game-card.has-some  { border-left-color: #d69e2e; }
    .game-card.has-none  { border-left-color: #e2e8f0; opacity: 0.7; }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .matchup {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a202c;
    }
    .game-meta {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 0.15rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-green  { background: #c6f6d5; color: #276749; }
    .badge-yellow { background: #fefcbf; color: #744210; }
    .badge-gray   { background: #edf2f7; color: #718096; }

    .player-lists {
      margin-top: 0.65rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .team-players {
      flex: 1;
      min-width: 140px;
    }
    .team-label {
      font-size: 0.73rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #a0aec0;
      margin-bottom: 0.25rem;
    }
    .player-chip {
      display: inline-block;
      border-radius: 6px;
      padding: 0.18rem 0.45rem;
      font-size: 0.78rem;
      font-weight: 500;
      margin: 0.15rem 0.15rem 0 0;
    }
    .player-chip.mine {
      background: #ebf8ff;
      color: #2b6cb0;
    }
    .player-chip.mine .pos { color: #90cdf4; font-size: 0.7rem; margin-left: 0.2rem; }
    .player-chip.opp {
      background: #fff7ed;
      color: #c05621;
    }
    .player-chip.opp .pos { color: #f6ad55; font-size: 0.7rem; margin-left: 0.2rem; }

    /* Game lookup — fantasy team cards */
    .fantasy-team-card {
      background: white;
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-left: 5px solid #e2e8f0;
      transition: box-shadow 0.15s;
    }
    .fantasy-team-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
    .fantasy-team-card.has-many { border-left-color: #38a169; }
    .fantasy-team-card.has-some { border-left-color: #d69e2e; }
    .fantasy-team-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .fantasy-team-name {
      font-size: 1rem;
      font-weight: 700;
      color: #1a202c;
    }
    .fantasy-team-manager {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 0.1rem;
    }

    /* Game lookup — selected game banner */
    .game-banner {
      background: white;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.9rem;
      color: #4a5568;
    }
    .game-banner strong { color: #1a202c; font-size: 1rem; }
    .game-banner .game-time { font-size: 0.78rem; color: #a0aec0; margin-top: 0.15rem; }

    .matchup-banner {
      background: white;
      border-radius: 10px;
      padding: 0.6rem 1rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      font-size: 0.85rem;
      color: #4a5568;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .matchup-banner strong { color: #1a202c; }
    .legend { display: flex; gap: 0.75rem; margin-left: auto; }
    .legend-dot {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.78rem; font-weight: 600;
    }
    .dot-mine { width: 10px; height: 10px; border-radius: 3px; background: #bee3f8; }
    .dot-opp  { width: 10px; height: 10px; border-radius: 3px; background: #fbd38d; }

    .error-box {
      background: #fff5f5;
      border: 1.5px solid #fc8181;
      color: #c53030;
      border-radius: 10px;
      padding: 0.85rem 1rem;
      font-size: 0.88rem;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 1.4rem; }
      .controls { flex-direction: column; }
      button#find-btn { width: 100%; }
      .mode-toggle { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚾ Fantasy Game Picker</h1>
  <p>Find the best games to watch for your fantasy roster</p>
</header>

<div class="container">

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button id="btn-mode-team" class="mode-btn active" onclick="setMode('team')">🔍 Find games for my team</button>
    <button id="btn-mode-game" class="mode-btn" onclick="setMode('game')">👥 Who's in this game?</button>
  </div>

  <div class="controls">
    <!-- Team mode: fantasy team selector -->
    <div class="control-group" id="team-group">
      <label for="team-select">Your Fantasy Team</label>
      <select id="team-select" disabled>
        <option value="">Loading teams…</option>
      </select>
    </div>

    <!-- Shared: date -->
    <div class="control-group">
      <label for="date-picker">Date</label>
      <input type="date" id="date-picker" onchange="onDateChange()" />
    </div>

    <!-- Game mode: game selector -->
    <div class="control-group" id="game-group" style="display:none">
      <label for="game-select">Game</label>
      <select id="game-select" disabled>
        <option value="">— Pick a date first —</option>
      </select>
    </div>

    <button id="find-btn" onclick="handleSubmit()" disabled>Find Games</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>
</div>

<script>
  let rosters = null;
  let currentMode = "team";
  let cachedGames = {}; // date → games array

  // ── Init ──────────────────────────────────────────────────────────────────

  document.addEventListener("DOMContentLoaded", async () => {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm   = String(today.getMonth() + 1).padStart(2, "0");
    const dd   = String(today.getDate()).padStart(2, "0");
    document.getElementById("date-picker").value = `${yyyy}-${mm}-${dd}`;

    setStatus("Loading team rosters…");
    try {
      const resp = await fetch("rosters.json");
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      rosters = await resp.json();
      populateTeams(rosters.teams);
      const updated = new Date(rosters.updated).toLocaleString();
      setStatus(`Rosters last updated: ${updated}`);
    } catch (e) {
      showError("Could not load roster data. The roster file may not have been generated yet — run the GitHub Action or <code>python fetch_rosters.py</code> first.");
      setStatus("");
    }
  });

  function populateTeams(teams) {
    const sel = document.getElementById("team-select");
    sel.innerHTML = '<option value="">— Pick your team —</option>';
    [...teams]
      .sort((a, b) => a.team_name.localeCompare(b.team_name))
      .forEach(t => {
        const opt = document.createElement("option");
        opt.value = t.team_id;
        opt.textContent = `${t.team_name}  (${t.manager})`;
        sel.appendChild(opt);
      });
    sel.disabled = false;
    document.getElementById("find-btn").disabled = false;
  }

  // ── Mode switching ─────────────────────────────────────────────────────────

  function setMode(mode) {
    currentMode = mode;

    document.getElementById("btn-mode-team").classList.toggle("active", mode === "team");
    document.getElementById("btn-mode-game").classList.toggle("active", mode === "game");

    document.getElementById("team-group").style.display = mode === "team" ? "" : "none";
    document.getElementById("game-group").style.display = mode === "game" ? "" : "none";

    document.getElementById("find-btn").textContent = mode === "team" ? "Find Games" : "Look Up";
    document.getElementById("results").innerHTML = "";

    if (mode === "game") {
      const date = document.getElementById("date-picker").value;
      if (date) fetchGamesForDate(date);
    }
  }

  async function onDateChange() {
    if (currentMode === "game") {
      const date = document.getElementById("date-picker").value;
      if (date) await fetchGamesForDate(date);
    }
  }

  async function fetchGamesForDate(date) {
    if (cachedGames[date]) {
      populateGameSelect(cachedGames[date]);
      return;
    }
    const gameSel = document.getElementById("game-select");
    gameSel.disabled = true;
    gameSel.innerHTML = '<option value="">Loading games…</option>';
    setStatus("Fetching MLB schedule…");
    try {
      const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}&hydrate=team`;
      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`MLB API ${resp.status}`);
      const data = await resp.json();
      const games = data.dates?.[0]?.games ?? [];
      cachedGames[date] = games;
      populateGameSelect(games);
      setStatus(`Rosters last updated: ${new Date(rosters.updated).toLocaleString()}`);
    } catch (e) {
      gameSel.innerHTML = '<option value="">Failed to load games</option>';
      setStatus("Could not fetch MLB schedule.");
    }
  }

  function populateGameSelect(games) {
    const gameSel = document.getElementById("game-select");
    if (games.length === 0) {
      gameSel.innerHTML = '<option value="">No games on this date</option>';
      gameSel.disabled = true;
      return;
    }
    gameSel.innerHTML = '<option value="">— Pick a game —</option>';
    games.forEach((g, i) => {
      const away = g.teams?.away?.team?.name ?? "Away";
      const home = g.teams?.home?.team?.name ?? "Home";
      const time = g.gameDate
        ? new Date(g.gameDate).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
        : "";
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = `${away} @ ${home}${time ? "  ·  " + time : ""}`;
      gameSel.appendChild(opt);
    });
    gameSel.disabled = false;
  }

  // ── Submit handler ─────────────────────────────────────────────────────────

  function handleSubmit() {
    if (currentMode === "team") findGames();
    else lookupGame();
  }

  // ── Team mode ──────────────────────────────────────────────────────────────

  async function findGames() {
    const teamId = document.getElementById("team-select").value;
    const date   = document.getElementById("date-picker").value;

    if (!teamId) { setStatus("Please select a team."); return; }
    if (!date)   { setStatus("Please pick a date."); return; }

    const fantasyTeam = rosters.teams.find(t => t.team_id === teamId);
    const opponent    = findOpponent(teamId);
    const myByTeam    = buildTeamMap(fantasyTeam.players);
    const oppByTeam   = opponent ? buildTeamMap(opponent.players) : {};

    setStatus("Fetching MLB schedule…");
    document.getElementById("find-btn").disabled = true;
    document.getElementById("results").innerHTML = "";

    try {
      const games = await getGames(date);
      renderTeamModeResults(games, myByTeam, oppByTeam, fantasyTeam, opponent, date);
      setStatus(`Rosters last updated: ${new Date(rosters.updated).toLocaleString()}`);
    } catch (e) {
      showError("Failed to fetch the MLB schedule. Check your connection and try again.");
      setStatus("");
    } finally {
      document.getElementById("find-btn").disabled = false;
    }
  }

  // ── Game lookup mode ───────────────────────────────────────────────────────

  async function lookupGame() {
    const date    = document.getElementById("date-picker").value;
    const gameIdx = document.getElementById("game-select").value;

    if (!date)              { setStatus("Please pick a date."); return; }
    if (gameIdx === "")     { setStatus("Please select a game."); return; }
    if (!rosters)           { setStatus("Roster data not loaded yet."); return; }

    const games = cachedGames[date] ?? [];
    const game  = games[parseInt(gameIdx, 10)];
    if (!game) { setStatus("Game not found."); return; }

    document.getElementById("find-btn").disabled = true;
    document.getElementById("results").innerHTML = "";

    const awayAbbr = normalizeAbbr(game.teams?.away?.team?.abbreviation);
    const homeAbbr = normalizeAbbr(game.teams?.home?.team?.abbreviation);
    const awayName = game.teams?.away?.team?.name ?? awayAbbr;
    const homeName = game.teams?.home?.team?.name ?? homeAbbr;

    // For every fantasy team, find players in this game
    const teamResults = rosters.teams.map(ft => {
      const awayPlayers = ft.players.filter(p => normalizeAbbr(p.mlb_team) === awayAbbr && awayAbbr);
      const homePlayers = ft.players.filter(p => normalizeAbbr(p.mlb_team) === homeAbbr && homeAbbr);
      return { fantasyTeam: ft, awayPlayers, homePlayers, count: awayPlayers.length + homePlayers.length };
    }).filter(r => r.count > 0)
      .sort((a, b) => b.count - a.count);

    renderGameLookupResults(game, awayAbbr, homeAbbr, awayName, homeName, teamResults, date);
    setStatus(`Rosters last updated: ${new Date(rosters.updated).toLocaleString()}`);
    document.getElementById("find-btn").disabled = false;
  }

  function renderGameLookupResults(game, awayAbbr, homeAbbr, awayName, homeName, teamResults, date) {
    const container = document.getElementById("results");
    const html = [];

    const gameTime = game.gameDate
      ? new Date(game.gameDate).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
      : "";
    const venue = game.venue?.name ?? "";

    html.push(`
<div class="game-banner">
  <strong>${awayName} @ ${homeName}</strong>
  <div class="game-time">${[formatDate(date), gameTime, venue].filter(Boolean).join("  ·  ")}</div>
</div>`);

    html.push(`<div class="results-header">${teamResults.length} fantasy team${teamResults.length !== 1 ? "s" : ""} with players in this game</div>`);

    if (teamResults.length === 0) {
      html.push(`<div class="no-games">No fantasy players from any team are in this game.</div>`);
    } else {
      for (const r of teamResults) {
        const cardClass  = r.count >= 3 ? "has-many" : "has-some";
        const badgeClass = r.count >= 3 ? "badge-green" : "badge-yellow";
        const badgeLabel = r.count === 1 ? "1 player" : `${r.count} players`;

        const awayChips = r.awayPlayers.map(p =>
          `<span class="player-chip mine">${p.name}<span class="pos">${p.position}</span></span>`
        ).join("");
        const homeChips = r.homePlayers.map(p =>
          `<span class="player-chip mine">${p.name}<span class="pos">${p.position}</span></span>`
        ).join("");

        const awaySection = r.awayPlayers.length > 0 ? `
<div class="team-players">
  <div class="team-label">Away: ${awayAbbr}</div>
  ${awayChips}
</div>` : "";

        const homeSection = r.homePlayers.length > 0 ? `
<div class="team-players">
  <div class="team-label">Home: ${homeAbbr}</div>
  ${homeChips}
</div>` : "";

        html.push(`
<div class="fantasy-team-card ${cardClass}">
  <div class="fantasy-team-header">
    <div>
      <div class="fantasy-team-name">${r.fantasyTeam.team_name}</div>
      <div class="fantasy-team-manager">${r.fantasyTeam.manager}</div>
    </div>
    <span class="badge ${badgeClass}">${badgeLabel}</span>
  </div>
  <div class="player-lists">
    ${awaySection}
    ${homeSection}
  </div>
</div>`);
      }
    }

    container.innerHTML = html.join("");
  }

  // ── Shared helpers ─────────────────────────────────────────────────────────

  async function getGames(date) {
    if (cachedGames[date]) return cachedGames[date];
    const url = `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${date}&hydrate=team`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`MLB API returned ${resp.status}`);
    const data = await resp.json();
    cachedGames[date] = data.dates?.[0]?.games ?? [];
    return cachedGames[date];
  }

  function buildTeamMap(players) {
    const map = {};
    for (const p of players) {
      const abbr = normalizeAbbr(p.mlb_team);
      if (!abbr || abbr === "FA") continue;
      (map[abbr] = map[abbr] || []).push(p);
    }
    return map;
  }

  function findOpponent(teamId) {
    if (!rosters.matchups?.length) return null;
    for (const m of rosters.matchups) {
      if (m.team1_id === teamId) return rosters.teams.find(t => t.team_id === m.team2_id) ?? null;
      if (m.team2_id === teamId) return rosters.teams.find(t => t.team_id === m.team1_id) ?? null;
    }
    return null;
  }

  // ── Team mode rendering ────────────────────────────────────────────────────

  function renderTeamModeResults(games, myByTeam, oppByTeam, fantasyTeam, opponent, date) {
    const container = document.getElementById("results");

    if (games.length === 0) {
      container.innerHTML = `<div class="no-games">No MLB games scheduled on ${formatDate(date)}.</div>`;
      return;
    }

    const annotated = games.map(game => {
      const awayAbbr = normalizeAbbr(game.teams?.away?.team?.abbreviation);
      const homeAbbr = normalizeAbbr(game.teams?.home?.team?.abbreviation);
      const awayName = game.teams?.away?.team?.name ?? awayAbbr;
      const homeName = game.teams?.home?.team?.name ?? homeAbbr;

      const awayMine = myByTeam[awayAbbr]  ?? [];
      const homeMine = myByTeam[homeAbbr]  ?? [];
      const awayOpp  = oppByTeam[awayAbbr] ?? [];
      const homeOpp  = oppByTeam[homeAbbr] ?? [];
      const count    = awayMine.length + homeMine.length + awayOpp.length + homeOpp.length;

      return { game, awayAbbr, homeAbbr, awayName, homeName, awayMine, homeMine, awayOpp, homeOpp, count };
    });

    annotated.sort((a, b) => b.count - a.count);

    const withPlayers    = annotated.filter(g => g.count > 0);
    const withoutPlayers = annotated.filter(g => g.count === 0);

    const html = [];

    const weekLabel = rosters.current_week ? ` · Week ${rosters.current_week}` : "";
    if (opponent) {
      html.push(`
<div class="matchup-banner">
  <span><strong>${fantasyTeam.team_name}</strong> vs <strong>${opponent.team_name}</strong>${weekLabel}</span>
  <div class="legend">
    <span class="legend-dot"><span class="dot-mine"></span> Your players</span>
    <span class="legend-dot"><span class="dot-opp"></span> Their players</span>
  </div>
</div>`);
    }

    html.push(`<div class="results-header">${formatDate(date)}</div>`);

    if (withPlayers.length === 0) {
      html.push(`<div class="no-games">No fantasy players active on ${formatDate(date)}. Check back on a game day!</div>`);
    } else {
      for (const g of withPlayers) html.push(gameCardHTML(g, !!opponent));
    }

    if (withoutPlayers.length > 0) {
      html.push(`<div class="results-header" style="margin-top:1.25rem">Other games (no players)</div>`);
      for (const g of withoutPlayers) html.push(gameCardHTML(g, !!opponent));
    }

    container.innerHTML = html.join("");
  }

  function gameCardHTML({ game, awayAbbr, homeAbbr, awayName, homeName, awayMine, homeMine, awayOpp, homeOpp, count }, hasOpponent) {
    const cardClass  = count >= 3 ? "has-many" : count >= 1 ? "has-some" : "has-none";
    const badgeClass = count >= 3 ? "badge-green" : count >= 1 ? "badge-yellow" : "badge-gray";

    const myCount  = awayMine.length + homeMine.length;
    const oppCount = awayOpp.length  + homeOpp.length;
    let badgeLabel;
    if (count === 0) {
      badgeLabel = "No players";
    } else if (hasOpponent && oppCount > 0) {
      badgeLabel = `${myCount} yours · ${oppCount} theirs`;
    } else {
      badgeLabel = myCount === 1 ? "1 player" : `${myCount} players`;
    }

    const gameTime = game.gameDate
      ? new Date(game.gameDate).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })
      : "";
    const venue = game.venue?.name ?? "";

    const hasAny = count > 0;

    return `
<div class="game-card ${cardClass}">
  <div class="game-header">
    <div>
      <div class="matchup">${awayName} @ ${homeName}</div>
      <div class="game-meta">${[gameTime, venue].filter(Boolean).join(" · ")}</div>
    </div>
    <span class="badge ${badgeClass}">${badgeLabel}</span>
  </div>
  ${hasAny ? `
  <div class="player-lists">
    ${playerListHTML(awayAbbr, awayMine, awayOpp, "Away")}
    ${playerListHTML(homeAbbr, homeMine, homeOpp, "Home")}
  </div>` : ""}
</div>`;
  }

  function playerListHTML(abbr, minePlayers, oppPlayers, side) {
    if (minePlayers.length === 0 && oppPlayers.length === 0) return "";
    const chips = [
      ...minePlayers.map(p => `<span class="player-chip mine">${p.name}<span class="pos">${p.position}</span></span>`),
      ...oppPlayers.map(p  => `<span class="player-chip opp">${p.name}<span class="pos">${p.position}</span></span>`),
    ].join("");
    return `
<div class="team-players">
  <div class="team-label">${side}: ${abbr}</div>
  ${chips}
</div>`;
  }

  // ── Helpers ────────────────────────────────────────────────────────────────

  function normalizeAbbr(raw) {
    if (!raw) return "";
    const s = raw.toUpperCase().trim();
    const map = { "AZ": "ARI", "WAS": "WSH" };
    return map[s] ?? s;
  }

  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split("-").map(Number);
    return new Date(y, m - 1, d).toLocaleDateString(undefined, {
      weekday: "long", month: "long", day: "numeric", year: "numeric",
    });
  }

  function setStatus(msg) {
    document.getElementById("status").textContent = msg;
  }

  function showError(html) {
    document.getElementById("results").innerHTML = `<div class="error-box">${html}</div>`;
  }
</script>
</body>
</html>
